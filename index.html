<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Símplex de Dos Fases - Investigación Operativa</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>Método Símplex</h1>
        <p>Rene Ulo Mollo - DERUM</p>
      </header>

      <main class="app-main">
        <!-- Configuración del problema -->
        <section id="setup-section" class="card">
          <h2>Configuración del Problema</h2>
          <div class="form-row">
            <div class="form-group">
              <label for="num-vars">Número de variables</label>
              <input type="number" id="num-vars" min="1" max="20" value="2" />
            </div>
            <div class="form-group">
              <label for="num-constraints">Número de restricciones</label>
              <input
                type="number"
                id="num-constraints"
                min="1"
                max="20"
                value="3"
              />
            </div>
            <div class="form-group">
              <label for="opt-type">Tipo de optimización</label>
              <select id="opt-type">
                <option value="max">Maximizar (Máx)</option>
                <option value="min">Minimizar (Mín)</option>
              </select>
            </div>
            <div class="form-group form-group-btn">
              <button id="generate-btn" class="btn btn-primary">Generar</button>
            </div>
          </div>
        </section>

        <!-- Ingreso de datos -->
        <section id="input-section" class="card hidden">
          <h2>Datos del Problema</h2>
          <div id="problem-input"></div>
          <div class="form-actions">
            <button id="solve-btn" class="btn btn-success">Resolver</button>
            <button id="reset-btn" class="btn btn-secondary">Reiniciar</button>
          </div>
        </section>

        <!-- Resultados -->
        <section id="results-section" class="hidden">
          <div id="results-content"></div>
        </section>

        <!-- Mensajes de error -->
        <div id="error-msg" class="msg msg-error hidden"></div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
